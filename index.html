<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Часы и Погода</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" id="theme-stylesheet" href="themes/default/default.css">
  <script src="js/theme-manager.js"></script>
</head>
<body>
  <div id="widget">
    <div id="header-controls">
      <button id="close-btn" class="ctrl-btn" title="Закрыть">✕</button>
      <button id="settings-btn" class="ctrl-btn" title="Настройки">⚙</button>
    </div>

    <div class="clock-section">
      <div id="time">00:00<span id="seconds">00</span></div>
      <div id="date">Загрузка...</div>
    </div>

    <div class="weather-section">
      <div class="weather-left">
        <div id="weather-icon"></div>
        <div class="weather-info">
          <div id="temperature">--°</div>
          <div id="weather-desc">--</div>
        </div>
      </div>
      <div class="weather-right">
        <div id="city-name">Определение города...</div>
        <div id="feels-like"></div>
        <div class="weather-extra" id="weather-extra"></div>
      </div>
    </div>

    <!-- ПАНЕЛЬ НАСТРОЕК -->
    <div id="settings-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="settings-title">⚙ Настройки</div>
        <button id="settings-close" style="background:none;border:none;color:var(--text-secondary);font-size:18px;cursor:pointer;line-height:1;">✕</button>
      </div>

      <div class="settings-group">
        <label>🎨 Тема</label>
        <select id="theme-select"></select>
      </div>

      <div class="settings-group">
        <label>🌍 Город</label>
        <input type="text" id="city-input" placeholder="Например: Moscow">
      </div>

      <div class="settings-row">
        <div class="settings-group">
          <label>🕐 Часовой пояс</label>
          <select id="timezone-select"><option value="auto">🔄 Авто</option></select>
        </div>
        <div class="settings-group">
          <label>🔢 Формат</label>
          <select id="format-select">
            <option value="24">24 часа</option>
            <option value="12">12 часов</option>
          </select>
        </div>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="always-top" checked><label for="always-top">Поверх окон</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="minimal-mode"><label for="minimal-mode">📐 Мини (300x50px)</label>
      </div>

      <div class="settings-group">
        <label>🔆 Прозрачность</label>
        <div class="opacity-control">
          <input type="range" id="opacity-slider" min="0.3" max="1" step="0.05" value="0.95">
          <span id="opacity-value">95%</span>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-auto" id="btn-auto-city" style="flex:2;">📍 Авто-город</button>
        <button class="btn btn-secondary" id="btn-cancel" style="flex:1.5;">Отмена</button>
        <button class="btn btn-primary" id="btn-save" style="flex:1.5;">✓ Сохранить</button>
      </div>

      <div class="support-section">
        <div class="support-title">❤️ Поддержать</div>
        <div class="support-buttons">
          <a href="https://pay.cloudtips.ru/p/eb970129" target="_blank" class="btn-donate btn-donate-rf">☕ CloudTips</a>
        </div>
      </div>

      <div class="author-footer">
        <div style="font-size:11px;color:var(--text-secondary);line-height:1.5;">
          Разработано: <strong style="color:var(--accent);">Виталий Стратиенко</strong><br>
          <a href="https://itbrutalik.ru" target="_blank">itbrutalik.ru</a> • v1.2.0
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
